project:
  name: cebt
  run_name: paper_v3
seed: 29

model:
  config_path: "configs/model/cebt_small.yaml"

training:
  epochs: 15
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  amp: true
  split:
    train_until: "2023-12-31"
    val_until: "2024-12-31"

loss:
  supervised_weight: 1.0
  control_delta_weight: 0.25
  kl_weight: 0.01
  sparsity_weight: 0.001
  consistency_weight: 0.05
  rank_weight: 0.10
  rank_temperature: 0.02
