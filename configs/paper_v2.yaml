project:
  name: cebt
  run_name: paper_v2
seed: 23

data:
  tickers: [
    "AAPL", "MSFT", "NVDA", "AMZN", "GOOGL",
    "META", "JPM", "XOM", "V", "MA",
    "COST", "HD", "PG", "NFLX", "JNJ",
    "BAC", "ABBV", "KO", "CRM", "AMD",
    "PEP", "WMT", "ORCL", "MRK", "CVX",
    "CSCO", "ACN", "MCD", "ADBE", "IBM",
    "GE", "TMO", "LIN", "ABT", "DIS",
    "QCOM", "CAT", "NOW", "INTU", "AMAT",
    "VZ", "TXN", "PM", "ISRG", "BKNG",
    "SPGI", "UNH", "LLY", "AVGO", "TGT"
  ]
  start_date: "2021-01-01"
  end_date: "2025-12-31"
  forms: ["8-K"]
  max_events_per_company: 100
  pre_window: 40
  horizon: 5
  control_blackout_days: 10
  controls_per_event: 1

sec:
  base_url: "https://data.sec.gov"
  archives_url: "https://www.sec.gov/Archives/edgar/data"
  ticker_url: "https://www.sec.gov/files/company_tickers.json"
  max_requests_per_second: 8
  user_agent_env: "SEC_USER_AGENT"

prices:
  provider: "auto"
  market_ticker: "SPY"

features:
  embedding:
    provider: "hashing"
    model_id: "cebt.hashing-v1"
    dim: 256
  metadata_dim: 6

model:
  config_path: "configs/model/cebt_small.yaml"

training:
  epochs: 15
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  amp: true
  split:
    train_until: "2023-12-31"
    val_until: "2024-12-31"
