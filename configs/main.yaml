project:
  name: cebt
  run_name: main
seed: 11

data:
  tickers: []
  start_date: "2018-01-01"
  end_date: "2025-12-31"
  forms: ["8-K", "10-Q", "10-K"]
  max_companies: 300
  max_events_per_company: null
  pre_window: 60
  horizon: 5
  control_blackout_days: 10
  controls_per_event: 2

sec:
  base_url: "https://data.sec.gov"
  archives_url: "https://www.sec.gov/Archives/edgar/data"
  ticker_url: "https://www.sec.gov/files/company_tickers_exchange.json"
  max_requests_per_second: 8
  user_agent_env: "SEC_USER_AGENT"

prices:
  provider: "stooq"
  market_ticker: "SPY"

features:
  embedding:
    provider: "hashing"
    model_id: "cebt.hashing-v1"
    dim: 512
  metadata_dim: 6

model:
  config_path: "configs/model/cebt_h200.yaml"

training:
  epochs: 20
  batch_size: 128
  learning_rate: 0.0005
  weight_decay: 0.0001
  amp: true
  split:
    train_until: "2023-12-31"
    val_until: "2024-12-31"
